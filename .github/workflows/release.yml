name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0-beta)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macOS_ARM
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: Windows_x64
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_suffix: Windows_ARM
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: Linux_x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: Linux_ARM

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libflac-dev \
            xdg-utils

      - name: Install macOS audio dependencies
        if: startsWith(matrix.platform, 'macos-')
        run: brew install flac

      - name: Install Windows audio dependencies
        if: startsWith(matrix.platform, 'windows-')
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/xiph/flac/archive/refs/tags/1.4.3.zip" -OutFile flac-src.zip
          Expand-Archive flac-src.zip -DestinationPath .
          cmake -S flac-1.4.3 -B flac-build `
            -DBUILD_SHARED_LIBS=OFF `
            -DWITH_OGG=OFF `
            -DBUILD_CXXLIBS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TESTING=OFF `
            -DINSTALL_MANPAGES=OFF `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build flac-build --config Release
          $libFile = Get-ChildItem -Recurse -Path flac-build -Name "FLAC.lib" | Select-Object -First 1
          $libPath = Split-Path (Resolve-Path "flac-build\$libFile")
          echo "LIB=$libPath;$env:LIB" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
        with:
          args: --target ${{ matrix.target }}

      - name: Package macOS artifact
        if: startsWith(matrix.platform, 'macos-')
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          codesign --force --deep --sign - "$BUNDLE_DIR/Disc Xplorer.app"
          cd "$BUNDLE_DIR"
          zip -r "$GITHUB_WORKSPACE/Disc Xplorer_${{ matrix.artifact_suffix }}_v${{ steps.version.outputs.VERSION }}.zip" "Disc Xplorer.app"

      - name: Package Windows artifact
        if: startsWith(matrix.platform, 'windows-')
        shell: powershell
        run: |
          $msi = Get-ChildItem -Recurse -Path "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          Copy-Item $msi.FullName "Disc Xplorer_${{ matrix.artifact_suffix }}_v${{ steps.version.outputs.VERSION }}.msi"

      - name: Package Linux artifact
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          APPIMAGE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "Disc Xplorer_${{ matrix.artifact_suffix }}_v${{ steps.version.outputs.VERSION }}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: disc-xplorer-${{ matrix.artifact_suffix }}
          path: |
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.zip
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.msi
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Disc Xplorer ${{ steps.tag.outputs.TAG }}
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-beta') || contains(steps.tag.outputs.TAG, '-alpha') }}
          draft: false
          files: |
            Disc Xplorer_macOS_ARM_*.zip
            Disc Xplorer_Windows_x64_*.msi
            Disc Xplorer_Windows_ARM_*.msi
            Disc Xplorer_Linux_x64_*.AppImage
            Disc Xplorer_Linux_ARM_*.AppImage
