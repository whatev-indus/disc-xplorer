name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0-beta)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macOS_ARM
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: Windows_x64
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_suffix: Windows_ARM
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: Linux_x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: Linux_ARM

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libflac-dev \
            xdg-utils

      - name: Install macOS audio dependencies
        if: startsWith(matrix.platform, 'macos-')
        run: brew install flac

      - name: Install Windows audio dependencies
        if: startsWith(matrix.platform, 'windows-')
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/xiph/flac/archive/refs/tags/1.4.3.zip" -OutFile flac-src.zip
          Expand-Archive flac-src.zip -DestinationPath .
          cmake -S flac-1.4.3 -B flac-build `
            -DBUILD_SHARED_LIBS=OFF `
            -DWITH_OGG=OFF `
            -DBUILD_CXXLIBS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TESTING=OFF `
            -DINSTALL_MANPAGES=OFF `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build flac-build --config Release
          $libFile = Get-ChildItem -Recurse -Path flac-build -Name "FLAC.lib" | Select-Object -First 1
          $libPath = Split-Path (Resolve-Path "flac-build\$libFile")
          echo "LIB=$libPath;$env:LIB" >> $env:GITHUB_ENV

      - name: Download redumper
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/superg/redumper/releases/latest --jq '.tag_name')
          echo "REDUMPER_VERSION=$TAG" >> "$GITHUB_ENV"
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)      ASSET="redumper-${TAG}-macos-arm64.zip"   ;;
            x86_64-pc-windows-msvc)    ASSET="redumper-${TAG}-windows-x64.zip"   ;;
            aarch64-pc-windows-msvc)   ASSET="redumper-${TAG}-windows-arm64.zip" ;;
            x86_64-unknown-linux-gnu)  ASSET="redumper-${TAG}-linux-x64.zip"     ;;
            aarch64-unknown-linux-gnu) ASSET="redumper-${TAG}-linux-arm64.zip"   ;;
          esac
          curl -fsSL "https://github.com/superg/redumper/releases/download/${TAG}/${ASSET}" -o redumper.zip
          unzip -o redumper.zip -d redumper-extracted/
          mkdir -p src-tauri/binaries
          case "${{ matrix.target }}" in
            *windows*)
              BIN=$(find redumper-extracted -name "redumper.exe" | head -1)
              cp "$BIN" "src-tauri/binaries/redumper-${{ matrix.target }}.exe"
              ;;
            *apple*)
              BIN=$(find redumper-extracted -type f -name "redumper" | head -1)
              DEST="src-tauri/binaries/redumper-${{ matrix.target }}"
              cp "$BIN" "$DEST"
              chmod +x "$DEST"
              # Copy bundled dylibs — the binary uses @executable_path/../lib rpath
              # and the app sets DYLD_LIBRARY_PATH to the resource lib dir at runtime
              LIB_SRC=$(find redumper-extracted -type d -name "lib" | head -1)
              mkdir -p src-tauri/lib
              cp "$LIB_SRC"/libc++.1.0.dylib "$LIB_SRC"/libc++abi.1.0.dylib "$LIB_SRC"/libunwind.1.0.dylib src-tauri/lib/
              ln -sf libc++.1.0.dylib src-tauri/lib/libc++.1.dylib
              ln -sf libc++abi.1.0.dylib src-tauri/lib/libc++abi.1.dylib
              ln -sf libunwind.1.0.dylib src-tauri/lib/libunwind.1.dylib
              ;;
            *)
              BIN=$(find redumper-extracted -type f -name "redumper" | head -1)
              cp "$BIN" "src-tauri/binaries/redumper-${{ matrix.target }}"
              chmod +x "src-tauri/binaries/redumper-${{ matrix.target }}"
              ;;
          esac

      - name: Install frontend dependencies
        run: npm install

      - name: Get app version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target ${{ matrix.target }}

      - name: Package macOS artifact
        if: startsWith(matrix.platform, 'macos-')
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          codesign --force --deep --sign - "$BUNDLE_DIR/Disc Xplorer.app"
          cd "$BUNDLE_DIR"
          zip -r "$GITHUB_WORKSPACE/Disc Xplorer_${{ matrix.artifact_suffix }}_v${{ steps.version.outputs.VERSION }}.zip" "Disc Xplorer.app"
          cp "Disc Xplorer.app.tar.gz" "$GITHUB_WORKSPACE/" 2>/dev/null || true
          cp "Disc Xplorer.app.tar.gz.sig" "$GITHUB_WORKSPACE/" 2>/dev/null || true

      - name: Package Windows artifact
        if: startsWith(matrix.platform, 'windows-')
        shell: powershell
        run: |
          $NAME = "Disc Xplorer_${{ matrix.artifact_suffix }}_v${{ steps.version.outputs.VERSION }}"
          $msi = Get-ChildItem -Recurse -Path "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter "*.msi" | Where-Object { $_.Name -notlike "*.msi.zip*" } | Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName "$NAME.msi" }
          $nsis = Get-ChildItem -Recurse -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -Filter "*.exe" | Where-Object { $_.Name -notlike "*.exe.zip*" } | Select-Object -First 1
          if ($nsis) { Copy-Item $nsis.FullName "$NAME-setup.exe" }
          $msiZip = Get-ChildItem -Recurse -Path "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter "*.msi.zip" | Select-Object -First 1
          if ($msiZip) { Copy-Item $msiZip.FullName "$NAME.updater.zip" }
          $msiSig = Get-ChildItem -Recurse -Path "src-tauri/target/${{ matrix.target }}/release/bundle/msi" -Filter "*.msi.zip.sig" | Select-Object -First 1
          if ($msiSig) { Copy-Item $msiSig.FullName "$NAME.updater.zip.sig" }

      - name: Package Linux artifact
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          APPIMAGE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | grep -v ".sig" | head -1)
          cp "$APPIMAGE" "Disc Xplorer_${{ matrix.artifact_suffix }}_v${{ steps.version.outputs.VERSION }}.AppImage"
          # Copy AppImage sig
          SIG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage.sig" | head -1)
          if [ -n "$SIG" ]; then cp "$SIG" .; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: disc-xplorer-${{ matrix.artifact_suffix }}
          path: |
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.zip
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.msi
            Disc Xplorer_${{ matrix.artifact_suffix }}_*-setup.exe
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.updater.zip
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.updater.zip.sig
            Disc Xplorer_${{ matrix.artifact_suffix }}_*.AppImage
            Disc Xplorer.app.tar.gz
            Disc Xplorer.app.tar.gz.sig
            *.AppImage.sig

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate latest.json
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          python3 - <<'EOF'
          import json, os, glob
          from datetime import datetime, timezone

          tag = os.environ['TAG']
          version = tag.lstrip('v')
          base_url = f"https://github.com/whatev-indus/disc-xplorer/releases/download/{tag}"

          candidates = [
              ("darwin-aarch64",  "*.app.tar.gz.sig",              "*.app.tar.gz"),
              ("linux-x86_64",    "*_amd64.AppImage.sig",          "Disc Xplorer_Linux_x64_*.AppImage"),
              ("linux-aarch64",   "*_aarch64.AppImage.sig",        "Disc Xplorer_Linux_ARM_*.AppImage"),
              ("windows-x86_64",  "*Windows_x64*.updater.zip.sig", "*Windows_x64*.updater.zip"),
              ("windows-aarch64", "*Windows_ARM*.updater.zip.sig", "*Windows_ARM*.updater.zip"),
          ]

          platforms = {}
          for key, sig_glob, art_glob in candidates:
              sigs = glob.glob(sig_glob)
              arts = [f for f in glob.glob(art_glob) if not f.endswith('.sig')]
              if sigs and arts:
                  sig_text = open(sigs[0]).read().strip()
                  art_name = os.path.basename(arts[0])
                  platforms[key] = {"signature": sig_text, "url": f"{base_url}/{art_name}"}

          payload = {
              "version": version,
              "notes": "",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(payload, f, indent=2)
          print(f"Generated latest.json v{version}: {list(platforms.keys())}")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Disc Xplorer ${{ steps.tag.outputs.TAG }}
          prerelease: ${{ contains(steps.tag.outputs.TAG, '-beta') || contains(steps.tag.outputs.TAG, '-alpha') }}
          draft: false
          body: |
            ## What's New in ${{ steps.tag.outputs.TAG }}

            ### Sector View — Compare Mode
            - Load a second disc image alongside the first for side-by-side byte-level comparison
            - Differing bytes highlighted in amber across both panels simultaneously
            - **Prev diff / Next diff** buttons to jump between differing sectors — fast bulk-read scanner (~1000× faster than per-sector for flat images like ISO/BIN)
            - Diff count per sector ("N bytes differ") and whole-disc "Images identical" indicator after full scan
            - Compare state (both images) preserved when popping out to a standalone window
            - Sync and ECC bytes now shown in blue instead of hard-to-read dark grey

            ### Disc Dump (redumper)
            - **Create Subfolder** option in the dump modal — defaults to disc Volume ID, falls back to timestamp, fully editable
            - After a successful dump, non-image files (logs, cue sheets, etc.) are automatically moved into a `logs/` subfolder

            ### Toolbar UX
            - **Open Disc Image** button becomes **Close Disc Image** when an image is loaded
            - Buttons hide contextually: Open Image hidden when disc from drive is active; drive buttons hidden when image is loaded or mounted
            - **Auto-select drive** when only one disc is inserted — skips the dropdown entirely
            - Removed vertical separators between toolbar buttons

            ### Other
            - Updated app icon (v3)

            ---

            ## Download

            | Platform | File |
            |----------|------|
            | **macOS** (Apple Silicon) | `Disc Xplorer_macOS_ARM_*.zip` |
            | **Windows** (x64) | `Disc Xplorer_Windows_x64_*-setup.exe` or `.msi` |
            | **Windows** (ARM) | `Disc Xplorer_Windows_ARM_*-setup.exe` or `.msi` |
            | **Linux** (x64) | `Disc Xplorer_Linux_x64_*.AppImage` |
            | **Linux** (ARM) | `Disc Xplorer_Linux_ARM_*.AppImage` |

            > **Windows users:** Download the `-setup.exe` (NSIS installer) or `.msi` — either installs the app. The `.updater.zip` files are used internally by the in-app auto-updater; you do not need to download them manually.
          files: |
            Disc Xplorer_macOS_ARM_*.zip
            Disc Xplorer.app.tar.gz
            Disc Xplorer_Windows_x64_*-setup.exe
            Disc Xplorer_Windows_x64_*.msi
            Disc Xplorer_Windows_x64_*.updater.zip
            Disc Xplorer_Windows_ARM_*-setup.exe
            Disc Xplorer_Windows_ARM_*.msi
            Disc Xplorer_Windows_ARM_*.updater.zip
            Disc Xplorer_Linux_x64_*.AppImage
            Disc Xplorer_Linux_ARM_*.AppImage
            latest.json
